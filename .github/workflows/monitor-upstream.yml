name: Monitor upstream changes

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      upstream_owner:
        description: "Upstream organization/user"
        required: false
        type: string
      upstream_repo:
        description: "Upstream repository name"
        required: false
        type: string
      upstream_branches:
        description: "Comma-separated branches to monitor (empty = all)"
        required: false
        type: string
      auto_sync:
        description: "Create sync PRs automatically for moved branches"
        required: false
        type: boolean
        default: false
      notify_issue:
        description: "Create/update issue notification when movement is detected"
        required: false
        type: boolean
        default: true

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  detect-upstream-updates:
    runs-on: ubuntu-latest
    env:
      INPUT_UPSTREAM_OWNER: ${{ github.event.inputs.upstream_owner }}
      INPUT_UPSTREAM_REPO: ${{ github.event.inputs.upstream_repo }}
      INPUT_UPSTREAM_BRANCHES: ${{ github.event.inputs.upstream_branches }}
      INPUT_AUTO_SYNC: ${{ github.event.inputs.auto_sync }}
      INPUT_NOTIFY_ISSUE: ${{ github.event.inputs.notify_issue }}
      VAR_UPSTREAM_OWNER: ${{ vars.UPSTREAM_OWNER }}
      VAR_UPSTREAM_REPO: ${{ vars.UPSTREAM_REPO }}
      VAR_UPSTREAM_BRANCHES: ${{ vars.UPSTREAM_BRANCHES }}
      VAR_UPSTREAM_AUTO_SYNC: ${{ vars.UPSTREAM_AUTO_SYNC }}
      VAR_UPSTREAM_NOTIFY_ISSUE: ${{ vars.UPSTREAM_NOTIFY_ISSUE }}
    steps:
      - name: Checkout downstream repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve configuration
        id: cfg
        shell: bash
        run: |
          set -euo pipefail

          upstream_owner="${INPUT_UPSTREAM_OWNER:-${VAR_UPSTREAM_OWNER:-}}"
          upstream_repo="${INPUT_UPSTREAM_REPO:-${VAR_UPSTREAM_REPO:-}}"
          upstream_branches="${INPUT_UPSTREAM_BRANCHES:-${VAR_UPSTREAM_BRANCHES:-}}"
          auto_sync="${INPUT_AUTO_SYNC:-${VAR_UPSTREAM_AUTO_SYNC:-false}}"
          notify_issue="${INPUT_NOTIFY_ISSUE:-${VAR_UPSTREAM_NOTIFY_ISSUE:-true}}"

          if [[ -z "${upstream_owner}" || -z "${upstream_repo}" ]]; then
            echo "UPSTREAM_OWNER and UPSTREAM_REPO must be set via workflow_dispatch inputs or repository variables (Settings -> Secrets and variables -> Actions -> Variables)."
            exit 1
          fi

          auto_sync="$(echo "${auto_sync}" | tr '[:upper:]' '[:lower:]')"
          notify_issue="$(echo "${notify_issue}" | tr '[:upper:]' '[:lower:]')"

          echo "upstream_owner=${upstream_owner}" >> "$GITHUB_OUTPUT"
          echo "upstream_repo=${upstream_repo}" >> "$GITHUB_OUTPUT"
          echo "upstream_branches=${upstream_branches}" >> "$GITHUB_OUTPUT"
          echo "auto_sync=${auto_sync}" >> "$GITHUB_OUTPUT"
          echo "notify_issue=${notify_issue}" >> "$GITHUB_OUTPUT"

      - name: Fetch origin and upstream refs
        shell: bash
        run: |
          set -euo pipefail
          git remote remove upstream 2>/dev/null || true
          git remote add upstream "https://github.com/${{ steps.cfg.outputs.upstream_owner }}/${{ steps.cfg.outputs.upstream_repo }}.git"
          git config remote.upstream.fetch "+refs/heads/*:refs/remotes/upstream/*"
          git fetch origin --prune
          git fetch upstream --prune

      - name: Configure git identity for sync branches
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Detect moved upstream branches
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          monitored="${{ steps.cfg.outputs.upstream_branches }}"
          declare -a branches=()
          if [[ -n "${monitored}" ]]; then
            IFS=',' read -r -a raw <<< "${monitored}"
            for item in "${raw[@]}"; do
              branch="$(echo "${item}" | xargs)"
              [[ -n "${branch}" ]] && branches+=("${branch}")
            done
          else
            while IFS= read -r b; do
              [[ "${b}" == "HEAD" ]] && continue
              branches+=("${b}")
            done < <(git for-each-ref --format='%(refname:strip=3)' refs/remotes/upstream)
          fi

          changed=false
          details=""
          changed_list=""
          pr_targets=""

          for branch in "${branches[@]}"; do
            if git show-ref --verify --quiet "refs/remotes/upstream/${branch}"; then
              upstream_sha="$(git rev-parse "refs/remotes/upstream/${branch}")"
            else
              details+="- \`${branch}\`: missing in upstream remote snapshot\n"
              continue
            fi

            if git show-ref --verify --quiet "refs/remotes/origin/${branch}"; then
              origin_sha="$(git rev-parse "refs/remotes/origin/${branch}")"
              if [[ "${upstream_sha}" != "${origin_sha}" ]]; then
                changed=true
                origin_short="$(git rev-parse --short "${origin_sha}")"
                upstream_short="$(git rev-parse --short "${upstream_sha}")"
                details+="- \`${branch}\`: upstream moved (\`${origin_short}\` -> \`${upstream_short}\`)\n"
                changed_list+="${branch},"
                pr_targets+="${branch},"
              fi
            else
              changed=true
              details+="- \`${branch}\`: exists upstream but not in downstream origin\n"
              changed_list+="${branch},"
            fi
          done

          changed_list="${changed_list%,}"
          pr_targets="${pr_targets%,}"
          if [[ -z "${details}" ]]; then
            details="No upstream branch movement detected."
          fi

          echo "changed=${changed}" >> "$GITHUB_OUTPUT"
          echo "changed_branches=${changed_list}" >> "$GITHUB_OUTPUT"
          echo "pr_targets=${pr_targets}" >> "$GITHUB_OUTPUT"
          {
            echo "details<<EOF"
            echo "${details}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create or update upstream update issue
        if: steps.detect.outputs.changed == 'true' && steps.cfg.outputs.notify_issue == 'true'
        uses: actions/github-script@v7
        env:
          DETAILS: ${{ steps.detect.outputs.details }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const title = "Upstream update detected";
            const source = "${{ steps.cfg.outputs.upstream_owner }}/${{ steps.cfg.outputs.upstream_repo }}";
            const label = "upstream-sync";
            const body = [
              `Detected upstream changes at: ${new Date().toISOString()}`,
              `Upstream source: ${source}`,
              ``,
              process.env.DETAILS || "No details available."
            ].join('\n');

            try {
              await github.rest.issues.getLabel({ owner, repo, name: label });
            } catch (error) {
              if (error.status === 404) {
                await github.rest.issues.createLabel({
                  owner,
                  repo,
                  name: label,
                  color: "1D76DB",
                  description: "Automated upstream sync notifications"
                });
              } else {
                throw error;
              }
            }

            const { data: labeledIssues } = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: "open",
              labels: label,
              per_page: 100
            });
            const existing = labeledIssues.find(i => i.title === title);
            let issueNumber;
            if (existing) {
              issueNumber = existing.number;
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issueNumber,
                body
              });
            } else {
              const created = await github.rest.issues.create({
                owner,
                repo,
                title,
                body
              });
              issueNumber = created.data.number;
            }

            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number: issueNumber,
              labels: [label]
            });

      - name: Create sync PRs for moved branches (optional)
        if: steps.detect.outputs.changed == 'true' && steps.cfg.outputs.auto_sync == 'true' && steps.detect.outputs.pr_targets != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          IFS=',' read -r -a targets <<< "${{ steps.detect.outputs.pr_targets }}"
          for branch in "${targets[@]}"; do
            [[ -z "${branch}" ]] && continue

            safe_branch="$(echo "${branch}" | tr '/ ' '--')"
            sync_branch="sync/upstream-${safe_branch}"

            if ! git show-ref --verify --quiet "refs/remotes/origin/${branch}"; then
              echo "Skipping ${branch}: downstream origin branch does not exist."
              continue
            fi

            if ! git show-ref --verify --quiet "refs/remotes/upstream/${branch}"; then
              echo "Skipping ${branch}: upstream branch does not exist."
              continue
            fi

            git checkout -B "${sync_branch}" "origin/${branch}"
            if ! git merge --no-edit "upstream/${branch}"; then
              git merge --abort || true
              echo "Skipping ${branch}: merge conflict while preparing sync branch."
              continue
            fi

            if [[ "$(git rev-parse "${sync_branch}")" == "$(git rev-parse "origin/${branch}")" ]]; then
              echo "Skipping ${branch}: no merge diff to sync."
              continue
            fi

            git push origin "${sync_branch}"

            existing_pr="$(gh pr list \
              --state open \
              --base "${branch}" \
              --head "${sync_branch}" \
              --json number \
              --jq '.[0].number')"

            pr_title="Sync ${branch} from upstream (${{ steps.cfg.outputs.upstream_owner }}/${{ steps.cfg.outputs.upstream_repo }})"
            pr_body=$'Automated upstream sync PR.\n\n- Source: upstream/'"${branch}"$'\n- Trigger: monitor-upstream workflow'

            if [[ -n "${existing_pr}" && "${existing_pr}" != "null" ]]; then
              gh pr edit "${existing_pr}" --title "${pr_title}" --body "${pr_body}"
            else
              gh pr create \
                --base "${branch}" \
                --head "${sync_branch}" \
                --title "${pr_title}" \
                --body "${pr_body}"
            fi
          done

      - name: Summary
        shell: bash
        run: |
          echo "Changed: ${{ steps.detect.outputs.changed }}"
          echo "Branches: ${{ steps.detect.outputs.changed_branches }}"
          echo "${{ steps.detect.outputs.details }}"
