name: Monitor upstream changes

on:
  schedule:
    - cron: '0 */6 * * *' # every 6 hours
  workflow_dispatch:
    inputs:
      upstream_owner:
        description: 'Upstream organization/user'
        required: false
        type: string
      upstream_repo:
        description: 'Upstream repository name'
        required: false
        type: string
      upstream_branches:
        description: 'Comma-separated branches to monitor (empty = all)'
        required: false
        type: string
      notify_issue:
        description: 'Create/update issue notification when movement is detected'
        required: false
        type: boolean
        default: true

permissions:
  contents: read
  issues: write

env:
  VAR_UPSTREAM_OWNER: braingazeInternsDec2024
  VAR_UPSTREAM_REPO: EasyGaze3D
  VAR_UPSTREAM_BRANCHES: ''
  VAR_UPSTREAM_NOTIFY_ISSUE: 'true'

jobs:
  detect-upstream-updates:
    runs-on: ubuntu-latest
    env:
      UPSTREAM_TOKEN: ${{ secrets.UPSTREAM_TOKEN }}
    steps:
      - name: Check upstream and notify
        uses: actions/github-script@v6
        with:
          script: |
            const upstreamOwner = process.env.VAR_UPSTREAM_OWNER || context.payload?.inputs?.upstream_owner;
            const upstreamRepo = process.env.VAR_UPSTREAM_REPO || context.payload?.inputs?.upstream_repo;
            const branchesInput = (context.payload?.inputs?.upstream_branches) || process.env.VAR_UPSTREAM_BRANCHES || '';
            const notifyIssue = ((context.payload && context.payload.inputs && context.payload.inputs.notify_issue) !== undefined)
              ? (context.payload.inputs.notify_issue === 'true' || context.payload.inputs.notify_issue === true)
              : (process.env.VAR_UPSTREAM_NOTIFY_ISSUE === 'true');

            const { Octokit } = require('@octokit/rest');
            const upstreamClient = process.env.UPSTREAM_TOKEN ? new Octokit({ auth: process.env.UPSTREAM_TOKEN }) : github;

            if (!upstreamOwner || !upstreamRepo) {
              core.info('Upstream owner/repo not configured; nothing to do.');
              return;
            }

            const branches = branchesInput.split(',').map(s => s.trim()).filter(Boolean);
            // if no branches specified, check all branches from upstream
            let upstreamBranches = branches;
            if (upstreamBranches.length === 0) {
              const list = await upstreamClient.rest.repos.listBranches({ owner: upstreamOwner, repo: upstreamRepo, per_page: 100 });
              upstreamBranches = list.data.map(b => b.name);
            }

            const changes = [];
            for (const branch of upstreamBranches) {
              try {
                const commits = await upstreamClient.rest.repos.listCommits({ owner: upstreamOwner, repo: upstreamRepo, sha: branch, per_page: 1 });
                if (!commits || !commits.data || commits.data.length === 0) continue;
                const commit = commits.data[0];
                changes.push({ branch, sha: commit.sha, message: commit.commit.message, url: commit.html_url });
              } catch (e) {
                core.warning(`Failed to check branch ${branch}: ${e.message}`);
              }
            }

            if (changes.length === 0) {
              core.info('No upstream commits found.');
              return;
            }

            if (!notifyIssue) {
              core.info('Notification disabled; exiting.');
              return;
            }

            // Create or update a single issue titled 'Upstream monitor — last update'
            const title = `Upstream changes: ${upstreamOwner}/${upstreamRepo}`;
            const bodyLines = [`Upstream repository **${upstreamOwner}/${upstreamRepo}** has recent commits:`];
            for (const c of changes) bodyLines.push(`- **${c.branch}**: ${c.sha} — ${c.message} — ${c.url}`);
            bodyLines.push('\n(Automated notification from monitor-upstream workflow)');
            const body = bodyLines.join('\n');

            // Find an open issue with same title
            const issues = await github.rest.issues.listForRepo({ owner: context.repo.owner, repo: context.repo.repo, state: 'open', per_page: 100 });
            const existing = issues.data.find(i => i.title === title);
            if (existing) {
              await github.rest.issues.update({ owner: context.repo.owner, repo: context.repo.repo, issue_number: existing.number, body });
            } else {
              await github.rest.issues.create({ owner: context.repo.owner, repo: context.repo.repo, title, body });
            }

  sync-upstream:
    needs: detect-upstream-updates
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add upstream remote and fetch
        run: |
          git remote add upstream https://github.com/${{ env.VAR_UPSTREAM_OWNER }}/${{ env.VAR_UPSTREAM_REPO }}.git || true
          git fetch upstream --prune --no-tags
        shell: bash

      - name: Create sync branches from upstream and push to origin
        id: create_syncs
        run: |
          PRESERVE="feat/independent-binocular-gaze-2921647012523280797"
          > sync_list.txt
          for ref in $(git for-each-ref --format='%(refname:short)' refs/remotes/upstream/); do
            branch=${ref#upstream/}
            if [ "$branch" = "$PRESERVE" ]; then
              echo "Skipping preserve branch $branch"
              continue
            fi
            upstream_sha=$(git rev-parse refs/remotes/upstream/$branch)
            origin_sha=$(git ls-remote origin refs/heads/$branch | cut -f1)
            if [ -z "$origin_sha" ] || [ "$upstream_sha" != "$origin_sha" ]; then
              echo "Creating sync branch for $branch"
              git checkout -b sync/upstream/$branch $upstream_sha
              git push origin sync/upstream/$branch --force
              echo "$branch sync/upstream/$branch" >> sync_list.txt
              git checkout --detach
            fi
          done
          cat sync_list.txt || true
        shell: bash

      - name: Create or update PRs for sync branches
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            const path = 'sync_list.txt';
            if (!fs.existsSync(path)) {
              core.info('No sync branches created.');
              return;
            }
            const lines = fs.readFileSync(path, 'utf8').split('\n').map(l => l.trim()).filter(Boolean);
            for (const line of lines) {
              const [baseBranch, headBranch] = line.split(' ');
              const title = `Sync from upstream/${baseBranch}`;
              const body = `Automated PR to sync changes from upstream branch **${baseBranch}** into this repository.\n\nThis PR was created by the upstream monitor workflow.`;
              // Find existing open PR with same head and base
              const prs = await github.rest.pulls.list({ owner: context.repo.owner, repo: context.repo.repo, state: 'open', head: `${context.repo.owner}:${headBranch}` });
              const existing = prs.data.find(p => p.base.ref === baseBranch);
              if (existing) {
                core.info(`PR already exists: ${existing.html_url}`);
              } else {
                await github.rest.pulls.create({ owner: context.repo.owner, repo: context.repo.repo, title, head: headBranch, base: baseBranch, body });
              }
            }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
